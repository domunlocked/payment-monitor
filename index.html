<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomZzz Payment Speaker</title>
<style>
:root {
    --primary: #00ff88;
    --bg: #0f172a;
}
body {
    background-color: var(--bg);
    color: white;
    font-family: 'Khmer OS Battambang', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}
.watermark {
    position: fixed;
    font-size: 10vw;
    opacity: 0.02;
    font-weight: 900;
    z-index: -1;
    pointer-events: none;
}
.card {
    background: linear-gradient(145deg,#1e293b,#020617);
    padding: 60px;
    border-radius: 40px;
    border: 2px solid var(--primary);
    text-align: center;
    width: 90%;
    max-width: 550px;
    box-shadow: 
        0 0 30px rgba(0,255,136,0.2),
        inset 0 0 30px rgba(0,255,136,0.05);
}
@keyframes pulseSpeaker {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
.animate-hit { animation: pulseSpeaker 0.6s ease; }
#amount {
    font-size: 6em;
    font-weight: 900;
    color: var(--primary);
    margin: 20px 0;
    text-shadow: 0 0 30px var(--primary);
}
#status { font-size: 1.5em; margin-bottom: 20px; }
.btn-start {
    background: var(--primary);
    color: var(--bg);
    border: none;
    padding: 20px 60px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    font-size: 1.5em;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
}
</style>
</head>
<body>

<div class="watermark">DomZzz</div>

<button class="btn-start" id="startBtn" onclick="activateSystem()">ចាប់ផ្ដើម)</button>

<div class="card" id="mainCard">
    <h2 id="status">រង់ចាំការបង់ប្រាក់...</h2>
    <div id="amount">---</div>
</div>

<audio id="bell" src="bell.mp3" preload="auto"></audio>

<script>
const BOT_TOKEN = "8506598103:AAFUXUD80oKJU8TOhzOEtGPjpDxSJohPt7U"; 
const CHAT_ID = -5018847296;

let lastId = 0;
let active = false;

// Activate system & unlock mobile audio
function activateSystem() {
    active = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('status').innerText = "📡 កំពុងរង់ចាំ ABA / ACLEDA / Wing QR...";

    const bell = document.getElementById('bell');
    bell.play().catch(()=>{}); bell.pause(); bell.currentTime=0;

    const wakeup = new SpeechSynthesisUtterance(" ");
    wakeup.lang = 'km-KH';
    window.speechSynthesis.speak(wakeup);

    setTimeout(() => {
        speakKhmer("ប្រព័ន្ធរួចរាល់");
    }, 100);
}

// Khmer Speech
function speakKhmer(text){
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'km-KH';
    utter.rate = 0.9;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    window.speechSynthesis.speak(utter);
}

// Convert number to Khmer words (up to billions)
function numberToKhmerWords(num) {
    const ones = ["សូន្យ","មួយ","ពីរ","បី","បួន","ប្រាំ","ប្រាំមួយ","ប្រាំពីរ","ប្រាំបី","ប្រាំបួន"];
    const tens = ["","ដប់","ម្ភៃ","សាមសិប","សែសិប","ហាសិប","ហុកសិប","ចិតសិប","ប៉ែតសិប","កៅសិប"];
    const units = ["","ពាន់","លាន","ពាន់លាន","ពាន់លានលាន"];

    function convertHundred(n){
        if(n===0) return "";
        let str="";
        if(n>=100){
            str += ones[Math.floor(n/100)] + " រយ ";
            n = n%100;
        }
        if(n>=20){
            str += tens[Math.floor(n/10)] + " ";
            n = n%10;
        }
        if(n>=10){
            if(n<20){
                str += "ដប់ " + ones[n%10];
                n=0;
            } else {
                str += tens[Math.floor(n/10)] + " ";
                n=n%10;
            }
        }
        if(n>0) str += ones[n];
        return str.trim();
    }

    function convert(num){
        if(num===0) return ones[0];
        let result="";
        const numStr = num.toString();
        let segments=[];
        let temp=num;
        while(temp>0){
            segments.push(temp%1000);
            temp=Math.floor(temp/1000);
        }
        for(let i=segments.length-1;i>=0;i--){
            if(segments[i]!==0){
                result += convertHundred(segments[i]) + " " + (units[i]||"") + " ";
            }
        }
        return result.trim();
    }

    let dollars = Math.floor(num);
    let cents = Math.round((num-dollars)*100);
    let result = "បានទទួលទឹកប្រាក់ចំនួន " + convert(dollars) + " ដុល្លារ";
    if(cents>0){
        result += " " + convert(cents) + " សេន";
    }
    return result;
}

// Handle payment text
function handlePayment(text){
    const match = text.match(/(\d+(?:,\d{3})*(?:\.\d+)?)/);
    if(match){
        let val = parseFloat(match[0].replace(/,/g,''));
        let currency = (text.includes("$") || text.toUpperCase().includes("USD")) ? "ដុល្លារ" : "រៀល";
        let symbol = (currency==="ដុល្លារ")?"$":"៛";

        // Khmer sentence
        let sentence = (currency==="ដុល្លារ") ? numberToKhmerWords(val) 
                                                : "បានទទួលទឹកប្រាក់ចំនួន " + val.toLocaleString() + " រៀល";

        // UI
        const card = document.getElementById('mainCard');
        document.getElementById('amount').innerText = val.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + symbol;

        card.classList.remove('animate-hit');
        void card.offsetWidth;
        card.classList.add('animate-hit');

        const bell = document.getElementById('bell');
        bell.currentTime=0;
        bell.play().catch(()=>{});

        setTimeout(()=> speakKhmer(sentence), 800);
    }
}

// Telegram polling (prevent duplicates)
async function update(){
    if(!active) return;
    try{
        const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId+1}`);
        const d = await r.json();
        if(d.ok){
            d.result.forEach(u=>{
                if(!u.message) return;
                const m = u.message;
                if(m.chat.id === CHAT_ID && m.message_id > lastId){
                    lastId = m.message_id;
                    if(m.text) handlePayment(m.text);
                }
            });
        }
    }catch(e){
        console.log("Fetch Error", e);
    }
}

// Poll every 2 seconds
setInterval(update, 2000);
</script>

</body>
</html>
