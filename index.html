<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomZzz Payment Monitor</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Khmer OS Battambang', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        /* Watermark Background */
        .watermark { 
            position: fixed; font-size: 12vw; opacity: 0.02; font-weight: 900; 
            z-index: -1; pointer-events: none; user-select: none;
        }
        
        /* Main Card */
        .card { 
            background: rgba(30, 41, 59, 0.8); padding: 60px; border-radius: 40px;
            border: 2px solid var(--primary); text-align: center; width: 85%; max-width: 550px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        /* Payment Animation (Bounce & Glow) */
        @keyframes paymentHit {
            0% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 255, 136, 0.1); }
            50% { transform: scale(1.15); box-shadow: 0 0 100px rgba(0, 255, 136, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 255, 136, 0.2); }
        }
        .animate-payment { animation: paymentHit 0.8s ease-out; }

        #amount { 
            font-size: 5em; color: var(--primary); font-weight: bold; margin: 25px 0; 
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .status { font-size: 16px; color: #94a3b8; letter-spacing: 1px; }

        /* Start Button */
        .btn-start {
            background: var(--primary); color: var(--bg); border: none; padding: 18px 50px;
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.4em; 
            margin-bottom: 40px; box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
            transition: 0.3s;
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 255, 136, 0.5); }
    </style>
</head>
<body>

    <div class="watermark">DomZzz</div>

    <button class="btn-start" id="startBtn" onclick="initSystem()">ចុចទីនេះដើម្បីចាប់ផ្ដើម (START)</button>

    <div class="card" id="paymentCard">
        <h2 id="statusTitle">រង់ចាំការបង់ប្រាក់...</h2>
        <div id="amount">---</div>
        <div class="status" id="connStatus">📡 កំពុងភ្ជាប់ទៅ bot...</div>
    </div>

    <audio id="bell" src="https://actions.google.com/sounds/v1/bells/service_bell.ogg" preload="auto"></audio>

    <script>
        // ================= CONFIG =================
        const BOT_TOKEN = "8506598103:AAFUXUD80oKJU8TOhzOEtGPjpDxSJohPt7U"; // <--- Put your Token here
        const CHAT_ID = -1003672530836;          // Your Group ID
        // ==========================================

        let lastMsgId = 0;
        let isReady = false;

        function initSystem() {
            isReady = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('statusTitle').innerText = "រង់ចាំការបង់ប្រាក់ពី ABA...";
            document.getElementById('connStatus').innerText = "📡 ប្រព័ន្ធកំពុងដំណើរការ";
            
            // Wake up the voice engine
            speak("ប្រព័ន្ធកំពុងដំណើរការ"); 
        }

        async function fetchTelegram() {
            if (!isReady) return;
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    const message = data.result[0].message;
                    
                    // Check for new message in the specific chat
                    if (message.chat.id === CHAT_ID && message.message_id !== lastMsgId) {
                        lastMsgId = message.message_id;
                        if (message.text) handleABA(message.text);
                    }
                }
            } catch (err) { console.error("Update failed"); }
        }

        function handleABA(text) {
            // Find numbers (handles $65.00 or ៛100)
            const numberMatch = text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
            
            if (numberMatch) {
                // Remove decimals (.00) and commas
                let rawVal = numberMatch[0].replace(/,/g, '');
                let cleanNum = Math.floor(parseFloat(rawVal));
                
                // Identify Currency
                let isUSD = text.includes("$") || text.toUpperCase().includes("USD");
                let currencyName = isUSD ? "ដុល្លារ" : "រៀល";
                let currencySym = isUSD ? "$" : "៛";

                // Build the phrase: បានទទួលទឹកប្រាក់ចំនួន [Number] [Currency]
                const speechPhrase = `បានទទួលទឹកប្រាក់ចំនួន ${cleanNum} ${currencyName}`;

                // --- UI UPDATE & ANIMATION ---
                const card = document.getElementById('paymentCard');
                document.getElementById('statusTitle').innerText = "បានទទួលប្រាក់ថ្មី!";
                document.getElementById('amount').innerText = `${cleanNum.toLocaleString()}${currencySym}`;
                
                // Trigger Animation
                card.classList.remove('animate-payment');
                void card.offsetWidth; // Force restart
                card.classList.add('animate-payment');

                // --- AUDIO OUTPUT ---
                const bell = document.getElementById('bell');
                bell.play(); // Play "Ding"

                // Delay speech slightly for the bell
                setTimeout(() => {
                    speak(speechPhrase);
                }, 600);
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'km-KH'; // Khmer Voice
            msg.rate = 0.85;    // Professional clear speed
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }

        // Loop every 2 seconds
        setInterval(fetchTelegram, 2000);
    </script>
</body>
</html>
