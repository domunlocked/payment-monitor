<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khmer Payment Speaker</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Khmer OS Battambang', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .watermark { position: fixed; font-size: 12vw; opacity: 0.02; font-weight: 900; z-index: -1; pointer-events: none; }
        .card { 
            background: rgba(30, 41, 59, 0.8); padding: 60px; border-radius: 40px;
            border: 2px solid var(--primary); text-align: center; box-shadow: 0 0 70px rgba(0,255,136,0.2);
            backdrop-filter: blur(15px); width: 80%; max-width: 500px;
        }
        #amount { font-size: 5em; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .btn-activate {
            background: var(--primary); color: var(--bg); border: none; padding: 15px 30px;
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin-bottom: 20px;
        }
        .status { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="watermark">PAYMENT</div>

    <button class="btn-activate" onclick="activateAudio()">សូមចុចទីនេះដើម្បីបើកសំឡេង (Click to Start)</button>

    <div class="card">
        <h2 id="title">រង់ចាំការបង់ប្រាក់...</h2>
        <div id="amount">---</div>
        <div class="status" id="status">📡 ភ្ជាប់ទៅ Telegram...</div>
    </div>

    <audio id="bell" src="https://actions.google.com/sounds/v1/bells/service_bell.ogg"></audio>

    <script>
        const BOT_TOKEN = "8506598103:AAFUXUD80oKJU8TOhzOEtGPjpDxSJohPt7U"; 
        const TARGET_CHAT_ID = -1003672530836;
        let lastMsgId = 0;
        let isAudioReady = false;

        function activateAudio() {
            isAudioReady = true;
            document.querySelector('.btn-activate').style.display = 'none';
            document.getElementById('status').innerText = "📡 ប្រព័ន្ធរង់ចាំការបង់ប្រាក់ (System Ready)";
            
            // Test sound
            const utter = new SpeechSynthesisUtterance("ប្រព័ន្ធដំណើរការ");
            utter.lang = 'km-KH';
            window.speechSynthesis.speak(utter);
        }

        async function listen() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                const data = await res.json();

                if (data.ok && data.result.length > 0) {
                    const latest = data.result[0].message;
                    
                    if (latest.chat.id === TARGET_CHAT_ID && latest.message_id !== lastMsgId) {
                        lastMsgId = latest.message_id;
                        if (latest.text) processText(latest.text);
                    }
                }
            } catch (err) { console.error("Connection lost"); }
        }

        function processText(text) {
            // Regex to find numbers
            const match = text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
            
            if (match && isAudioReady) {
                // CLEANER: This removes .00 and makes it a whole number
                let cleanNumber = Math.floor(parseFloat(match[0].replace(',', '')));

                const isDollar = text.includes("$") || text.toUpperCase().includes("USD");
                const currency = isDollar ? "ដុល្លារ" : "រៀល";
                
                // Final Sentence
                const speechText = `បានទទួលទឹកប្រាក់ចំនួន ${cleanNumber} ${currency}`;

                // Update UI
                document.getElementById('title').innerText = "ទឹកប្រាក់ទទួលបាន";
                document.getElementById('amount').innerText = `${cleanNumber}${isDollar ? '$' : '៛'}`;

                // Play Bell then Speak
                document.getElementById('bell').play();
                
                const utter = new SpeechSynthesisUtterance(speechText);
                utter.lang = 'km-KH'; // Khmer Google Voice
                utter.rate = 0.85;    // Natural Speed
                window.speechSynthesis.speak(utter);
            }
        }

        setInterval(listen, 2000);
    </script>
</body>
</html>
