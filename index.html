<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABA Payment Monitor</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Khmer OS Battambang', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .watermark { position: fixed; font-size: 10vw; opacity: 0.03; font-weight: 900; z-index: -1; pointer-events: none; }
        
        .card { 
            background: rgba(30, 41, 59, 0.8); padding: 50px; border-radius: 30px;
            border: 2px solid var(--primary); text-align: center; width: 85%; max-width: 500px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        @keyframes paymentBounce {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--primary)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
        }

        .animate-payment { animation: paymentBounce 0.8s ease-out; }
        #amount { font-size: 4.5em; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .btn-start {
            background: var(--primary); color: var(--bg); border: none; padding: 15px 40px;
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.3em; margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="watermark">PAYMENT</div>

    <button class="btn-start" id="startBtn" onclick="initSystem()">ចុចទីនេះដើម្បីចាប់ផ្ដើម (START)</button>

    <div class="card" id="paymentCard">
        <h2 id="statusTitle">រង់ចាំការបង់ប្រាក់...</h2>
        <div id="amount">---</div>
    </div>

    <audio id="bell" src="https://actions.google.com/sounds/v1/bells/service_bell.ogg"></audio>

    <script>
        const BOT_TOKEN = "8506598103:AAFUXUD80oKJU8TOhzOEtGPjpDxSJohPt7U"; 
        const CHAT_ID = -1003672530836;
        let lastMsgId = 0;
        let systemActive = false;

        function initSystem() {
            systemActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('statusTitle').innerText = "📡 កំពុងរង់ចាំ ABA QR...";
            speak("ប្រព័ន្ធរួចរាល់"); 
        }

        async function checkTelegram() {
            if (!systemActive) return;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    const msg = data.result[0].message;
                    if (msg.chat.id === CHAT_ID && msg.message_id !== lastMsgId) {
                        lastMsgId = msg.message_id;
                        if (msg.text) processABA(msg.text);
                    }
                }
            } catch (e) { console.log("Telegram Error"); }
        }

        function processABA(text) {
            // 1. Find the number (ignores commas and decimals)
            const match = text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
            
            if (match) {
                // Remove decimals (.00) so it sounds professional
                let rawNum = match[0].replace(/,/g, '');
                let num = Math.floor(parseFloat(rawNum));
                
                // 2. DETECT CURRENCY (Looking for $ or ៛)
                let currencyLabel = "រៀល";
                let displaySymbol = "៛";

                if (text.includes("$") || text.toUpperCase().includes("USD")) {
                    currencyLabel = "ដុល្លារ";
                    displaySymbol = "$";
                }

                // 3. BUILD THE SENTENCE
                const finalSentence = `បានទទួលទឹកប្រាក់ចំនួន ${num} ${currencyLabel}`;

                // UI Update
                const card = document.getElementById('paymentCard');
                document.getElementById('statusTitle').innerText = "បានទទួលប្រាក់ថ្មី";
                document.getElementById('amount').innerText = `${num.toLocaleString()}${displaySymbol}`;
                
                // Animation Effect
                card.classList.remove('animate-payment');
                void card.offsetWidth; 
                card.classList.add('animate-payment');

                // Audio Output
                document.getElementById('bell').play();
                speak(finalSentence);
            }
        }

        function speak(sentence) {
            const utter = new SpeechSynthesisUtterance(sentence);
            utter.lang = 'km-KH';
            utter.rate = 0.85; 
            window.speechSynthesis.speak(utter);
        }

        setInterval(checkTelegram, 2000);
    </script>
</body>
</html>
