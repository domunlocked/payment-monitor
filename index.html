<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomZzz Payment Speaker</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Khmer OS Battambang', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .watermark { position: fixed; font-size: 10vw; opacity: 0.02; font-weight: 900; z-index: -1; pointer-events: none; }
        .card { 
            background: rgba(30, 41, 59, 0.8); padding: 50px; border-radius: 40px;
            border: 2px solid var(--primary); text-align: center; width: 85%; max-width: 500px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1); backdrop-filter: blur(10px);
        }
        @keyframes paymentGlow {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--primary); }
            50% { transform: scale(1.1); box-shadow: 0 0 80px var(--primary); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--primary); }
        }
        .animate-hit { animation: paymentGlow 0.8s ease-out; }
        #amount { font-size: 5em; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .btn-start {
            background: var(--primary); color: var(--bg); border: none; padding: 20px 60px;
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.5em; 
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>

    <div class="watermark">DomZzz</div>

    <button class="btn-start" id="startBtn" onclick="activateSystem()">ចាប់ផ្ដើម (START)</button>

    <div class="card" id="mainCard">
        <h2 id="status">រង់ចាំការបង់ប្រាក់...</h2>
        <div id="amount">---</div>
    </div>

    <audio id="bell" src="bell.mp3" preload="auto"></audio>

    <script>
        const BOT_TOKEN = "8506598103:AAFUXUD80oKJU8TOhzOEtGPjpDxSJohPt7U"; 
        const CHAT_ID = -5018847296;
        
        let lastId = 0;
        let active = false;

        // Mobile Fix: Pre-load the speech engine
        function activateSystem() {
            active = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "📡 កំពុងរង់ចាំ ABA QR...";
            
            // Play sound immediately to unlock audio context on mobile
            const bell = document.getElementById('bell');
            bell.play();
            bell.pause();
            bell.currentTime = 0;

            // Mobile Fix: Force wake up the speech synthesis
            const wakeup = new SpeechSynthesisUtterance(" ");
            wakeup.lang = 'km-KH';
            window.speechSynthesis.speak(wakeup);

            // Confirmed start
            setTimeout(() => {
                speakKhmer("ប្រព័ន្ធរួចរាល់");
            }, 100);
        }

        async function update() {
            if (!active) return;
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                const d = await r.json();
                if (d.ok && d.result.length > 0) {
                    const m = d.result[0].message;
                    if (m.chat.id === CHAT_ID && m.message_id !== lastId) {
                        lastId = m.message_id;
                        if (m.text) handlePayment(m.text);
                    }
                }
            } catch (e) { console.log("Fetch Error"); }
        }

        function handlePayment(text) {
            const match = text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
            if (match) {
                let val = Math.floor(parseFloat(match[0].replace(/,/g, '')));
                let currency = (text.includes("$") || text.toUpperCase().includes("USD")) ? "ដុល្លារ" : "រៀល";
                let symbol = (currency === "ដុល្លារ") ? "$" : "៛";
                const sentence = `បានទទួលទឹកប្រាក់ចំនួន ${val} ${currency}`;

                // UI
                const card = document.getElementById('mainCard');
                document.getElementById('amount').innerText = val.toLocaleString() + symbol;
                card.classList.remove('animate-hit');
                void card.offsetWidth;
                card.classList.add('animate-hit');

                // Bell Sound
                const bell = document.getElementById('bell');
                bell.currentTime = 0;
                bell.play().catch(e => console.log("Audio Blocked"));

                // Speak after a short delay
                setTimeout(() => speakKhmer(sentence), 800);
            }
        }

        function speakKhmer(text) {
            // Cancel any ongoing speech to prevent mobile overlap
            window.speechSynthesis.cancel();

            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'km-KH'; 
            utter.rate = 0.9;
            utter.pitch = 1.0;
            utter.volume = 1.0;
            
            window.speechSynthesis.speak(utter);
        }

        // Check for updates
        setInterval(update, 2000);
    </script>
</body>
</html>
