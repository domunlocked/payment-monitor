<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Payment Monitor</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        /* Watermark */
        .watermark { 
            position: fixed; font-size: 10vw; opacity: 0.03; font-weight: 900; 
            z-index: -1; user-select: none; pointer-events: none;
        }
        /* Big Logo */
        .logo { width: 150px; margin-bottom: 20px; border-radius: 50%; border: 4px solid var(--primary); }
        
        .card { 
            background: rgba(30, 41, 59, 0.7); padding: 50px; border-radius: 30px;
            border: 1px solid rgba(0, 255, 136, 0.3); text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        #amount { font-size: 4em; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .status { font-size: 12px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="watermark">PAYMENT SYSTEM</div>

    <div class="card">
        <img src="https://via.placeholder.com/150" class="logo" alt="Logo">
        
        <h2 id="title">រង់ចាំការបង់ប្រាក់...</h2>
        <div id="amount">---</div>
        
        <div class="status" id="status">📡 កំពុងភ្ជាប់ទៅ Telegram...</div>
    </div>

    <audio id="bell" src="https://actions.google.com/sounds/v1/bells/service_bell.ogg"></audio>

    <script>
        // --- CONFIG ---
        const BOT_TOKEN = "8506598103:AAFUXUD80oKJU8TOhzOEtGPjpDxSJohPt7U"; // Put your token here
        const TARGET_CHAT_ID = -1003672530836;
        
        let lastMsgId = 0;

        async function listenToTelegram() {
            try {
                // Get the very last message from the bot
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                const data = await res.json();

                if (data.ok && data.result.length > 0) {
                    const latest = data.result[0].message;
                    
                    // 1. Check if it's from the right group
                    // 2. Check if it's a new message
                    if (latest.chat.id === TARGET_CHAT_ID && latest.message_id !== lastMsgId) {
                        lastMsgId = latest.message_id;
                        document.getElementById('status').innerText = "✅ បានទទួលទិន្នន័យថ្មី";
                        processText(latest.text || "");
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = "❌ បញ្ហាការតភ្ជាប់";
            }
        }

        function processText(text) {
            // Find numbers (money) in the text
            const match = text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
            
            if (match) {
                const amount = match[0];
                const currency = (text.includes("$") || text.toUpperCase().includes("USD")) ? "ដុល្លារ" : "រៀល";
                const speechText = `បានទទួលទឹកប្រាក់ចំនួន ${amount} ${currency}`;

                // Update UI
                document.getElementById('title').innerText = "ទឹកប្រាក់ទទួលបាន";
                document.getElementById('amount').innerText = `${amount} ${currency === 'ដុល្លារ' ? '$' : '៛'}`;

                // 1. Play Bell
                document.getElementById('bell').play();

                // 2. Speak Khmer (Google Voice style)
                const utter = new SpeechSynthesisUtterance(speechText);
                utter.lang = 'km-KH';
                utter.rate = 0.9;
                window.speechSynthesis.speak(utter);
            }
        }

        // Check for new messages every 2 seconds
        setInterval(listenToTelegram, 2000);
        document.getElementById('status').innerText = "📡 កំពុងរង់ចាំការបង់ប្រាក់...";
    </script>
</body>
</html>
